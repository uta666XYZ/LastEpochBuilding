name: Run Tests
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:
jobs:
  run_tests:
    runs-on: ubuntu-latest
    container: ghcr.io/pathofbuildingcommunity/pathofbuilding-tests:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run tests
        run: busted --lua=luajit --exclude-tags=""
      - name: Report coverage
        continue-on-error: true # Coverage report may fail if the coveralls.io server is overloaded
        run: cd src; luacov-coveralls --repo-token=${{ secrets.github_token }} -e TestData -e Data -e runtime
  # Heavy `check_generated_builds` job moved to .github/workflows/nightly.yml
  # to keep PR feedback under ~3 minutes. Run manually via workflow_dispatch
  # or wait for the nightly schedule.
  check_modcache:
    runs-on: ubuntu-latest
    container: ghcr.io/pathofbuildingcommunity/pathofbuilding-tests:latest
    steps:
      - name: Install git dependency
        run: apk add git
      - name: Checkout
        uses: actions/checkout@v4
      - name: Regenerate ModCache
        env:
          LUA_PATH: ../runtime/lua/?.lua;../runtime/lua/?/init.lua
          REGENERATE_MOD_CACHE: 1
        run: cd src; luajit HeadlessWrapper.lua
      - run: git config --global --add safe.directory $(pwd)
      - name: Check if the generated ModCache is different
        run: git diff --exit-code src/Data/ModCache.lua
