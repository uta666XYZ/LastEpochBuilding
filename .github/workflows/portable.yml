name: Create portable zip
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to upload zip to (e.g. v0.10.0). Leave empty to test build only.'
        required: false
permissions:
  contents: write
env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
            - name: Checkout
              uses: actions/checkout@v4.2.2
            - name: Get version
              run: |
                VERSION=$(grep -o '<Version number="[^"]*"' manifest.xml | grep -o '"[^"]*"' | tr -d '"')
                echo "VERSION=$VERSION" >> "$GITHUB_ENV"
            - name: Patch manifest for auto-updater
              run: |
                sed -i 's/<Version number="\([^"]*\)"/<Version number="\1" branch="master" platform="win32"/' manifest.xml
            - name: Build portable zip
              run: |
                mkdir -p dist/LastEpochBuilding
                rsync -a \
                  --exclude='msvcr100.dll' \
                  --exclude='SimpleGraphic.cfg' \
                  --exclude='imgui.ini' \
                  --exclude='lua-profiler.lua' \
                  runtime/ dist/LastEpochBuilding/runtime/
                rsync -a \
                  --exclude='HeadlessWrapper.lua' \
                  --exclude='LaunchInstall.lua' \
                  --exclude='Settings.xml' \
                  --exclude='*.log' \
                  --exclude='Export/' \
                  --exclude='Builds/' \
                  src/ dist/LastEpochBuilding/src/
                cp manifest.xml changelog.txt help.txt LICENSE.md Launch.bat dist/LastEpochBuilding/
                cp manifest.xml dist/LastEpochBuilding/src/manifest.xml
                cd dist
                zip -r "LastEpochBuilding-v${VERSION}-win.zip" LastEpochBuilding/
                echo "Built: LastEpochBuilding-v${VERSION}-win.zip"
                ls -lh "LastEpochBuilding-v${VERSION}-win.zip"
            - name: Upload to release (triggered by release event)
              if: github.event_name == 'release'
              run: |
                gh release upload "${{ github.event.release.tag_name }}" \
                  "dist/LastEpochBuilding-v${VERSION}-win.zip" --clobber
            - name: Save as artifact (manual test run)
              if: github.event_name == 'workflow_dispatch'
              uses: actions/upload-artifact@v4.6.2
              with:
                name: LastEpochBuilding-v${{ env.VERSION }}-win
                path: dist/*.zip
                retention-days: 7
