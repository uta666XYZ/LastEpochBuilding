name: Create portable zip
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to build (e.g. v0.10.0). Leave empty to build from dev without uploading.'
        required: false
env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
            - name: Checkout
              uses: actions/checkout@v5
              with:
                ref: ${{ github.event.release.tag_name || github.event.inputs.tag_name || 'dev' }}
            - name: Get version
              run: |
                VERSION=$(grep -o '<Version number="[^"]*"' manifest.xml | grep -o '"[^"]*"' | tr -d '"')
                echo "VERSION=$VERSION" >> "$GITHUB_ENV"
            - name: Compile Lua to bytecode
              run: |
                sudo apt-get install -y luajit
                find src -name "*.lua" \
                  ! -path "*/Export/*" \
                  ! -path "*/TreeData/*" \
                  ! -path "*/Data/*" | while read f; do
                  luajit -b "$f" "$f.tmp" && mv "$f.tmp" "$f"
                done
            - name: Patch manifest for auto-updater
              run: |
                sed -i 's/<Version number="\([^"]*\)"/<Version number="\1" branch="master" platform="win32"/' manifest.xml
            - name: Build portable zip
              run: |
                mkdir -p dist/LastEpochBuilding
                rsync -a \
                  --exclude='msvcr100.dll' \
                  --exclude='SimpleGraphic.cfg' \
                  --exclude='imgui.ini' \
                  --exclude='lua-profiler.lua' \
                  runtime/ dist/LastEpochBuilding/runtime/
                rsync -a \
                  --exclude='HeadlessWrapper.lua' \
                  --exclude='LaunchInstall.lua' \
                  --exclude='Settings.xml' \
                  --exclude='Export/' \
                  --exclude='Builds/' \
                  src/ dist/LastEpochBuilding/src/
                cp manifest.xml changelog.txt help.txt LICENSE.md Launch.bat dist/LastEpochBuilding/
                cd dist
                zip -r "LastEpochBuilding-v${VERSION}-win.zip" LastEpochBuilding/
            - name: Upload to release
              if: ${{ github.event.release.tag_name != '' || github.event.inputs.tag_name != '' }}
              run: |
                TAG="${{ github.event.release.tag_name || github.event.inputs.tag_name }}"
                gh release upload "$TAG" "dist/LastEpochBuilding-v${VERSION}-win.zip" --clobber
