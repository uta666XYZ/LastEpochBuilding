name: Release next version
run-name: Release version ${{ inputs.releaseVersion }}
on:
  workflow_dispatch:
      inputs:
          releaseVersion:
              description: 'Version number to use for this release'
              required: true
              default: '0.x.x/patch/minor'
          releaseNoteUrl:
              description: 'Enter the location of edited release notes to use'
              required: false
permissions:
  contents: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
            - name: Set line endings
              run: git config --global core.autocrlf true
            - name: Checkout
              uses: actions/checkout@v4
              with:
                ref: 'dev'
            - name: Calculate the next version
              run: |
                MANIFEST_VERSION=$(grep -o '<Version number="[^"]*' manifest.xml | sed 's/<Version number="//')
                NEXT_VERSION=${{ github.event.inputs.releaseVersion }}
                if [ $NEXT_VERSION = "patch" ]; then
                  NEXT_VERSION=$(echo $MANIFEST_VERSION | awk -F. '{print $1"."$2"."$3+1}')
                elif [ $NEXT_VERSION = "minor" ]; then
                  NEXT_VERSION=$(echo $MANIFEST_VERSION | awk -F. '{print $1"."$2+1".0"}')
                fi
                echo "NEXT_VERSION=$NEXT_VERSION" >> "$GITHUB_ENV"
            - name: Generate Release notes
              run: |
                # Extract this version's section from CHANGELOG.md
                awk "/^## \[v${NEXT_VERSION}\]/{found=1; next} /^## \[v/{if(found) exit} found{print}" CHANGELOG.md | sed '/^[[:space:]]*$/d;/^---$/d' > temp_notes.md
                # Delete existing draft release if present (from a failed previous run)
                gh release delete "v$NEXT_VERSION" --yes 2>/dev/null || true
                gh release create --target dev "v$NEXT_VERSION" --title "Release $NEXT_VERSION" --draft --notes-file temp_notes.md
            - name: Compile Lua to bytecode (secure distribution)
              run: |
                sudo apt-get install -y luajit
                find src -name "*.lua" \
                  ! -path "*/Export/*" \
                  ! -path "*/TreeData/*" \
                  ! -path "*/Data/*" | while read f; do
                  luajit -b "$f" "$f.tmp" && mv "$f.tmp" "$f"
                done
                echo "Lua bytecode compilation complete"
            - name: Update manifest version
              run: |
                sed -ri "s/<Version number=\"([^\"]*)\"/<Version number=\"$NEXT_VERSION\"/g" manifest.xml
                sed -i 's/<Version number="\([^"]*\)"/<Version number="\1" branch="dev" platform="win32"/' manifest.xml
            - name: Update manifest.xml
              run: python3 update_manifest.py --quiet --in-place
            - name: Build portable zip
              run: |
                mkdir -p dist/LastEpochBuilding
                rsync -a \
                  --exclude='msvcr100.dll' \
                  --exclude='SimpleGraphic.cfg' \
                  --exclude='imgui.ini' \
                  --exclude='lua-profiler.lua' \
                  runtime/ dist/LastEpochBuilding/runtime/
                rsync -a \
                  --exclude='HeadlessWrapper.lua' \
                  --exclude='LaunchInstall.lua' \
                  --exclude='Settings.xml' \
                  --exclude='*.log' \
                  --exclude='Export/' \
                  --exclude='Builds/' \
                  src/ dist/LastEpochBuilding/src/
                cp manifest.xml changelog.txt help.txt LICENSE.md Launch.bat dist/LastEpochBuilding/
                cp manifest.xml dist/LastEpochBuilding/src/manifest.xml
                cd dist
                zip -r "LastEpochBuilding-v${NEXT_VERSION}-win.zip" LastEpochBuilding/
            - name: Upload zip to draft release
              run: |
                gh release upload "v$NEXT_VERSION" "dist/LastEpochBuilding-v${NEXT_VERSION}-win.zip" --clobber
